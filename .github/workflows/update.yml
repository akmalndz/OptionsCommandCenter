name: Update Dashboard

on:
  schedule:
    # All times in UTC. Safe range: 14:30–19:45 UTC (every 35 min, 10 runs/day).
    #
    #   CDT (UTC-5, Mar–Nov):  9:30 AM – 2:45 PM CT  ← market hours ✓
    #   CST (UTC-6, Nov–Mar):  8:30 AM – 1:45 PM CT  ← market hours ✓
    #
    # Old schedule started at 13:30 UTC which fired at 7:30 AM CST (pre-market).
    # This range is safe in BOTH timezones — no pre-market, no after-hours runs.
    - cron: '30 14 * * 1-5'  #  9:30 AM CDT /  8:30 AM CST
    - cron: '5 15 * * 1-5'   # 10:05 AM CDT /  9:05 AM CST
    - cron: '40 15 * * 1-5'  # 10:40 AM CDT /  9:40 AM CST
    - cron: '15 16 * * 1-5'  # 11:15 AM CDT / 10:15 AM CST
    - cron: '50 16 * * 1-5'  # 11:50 AM CDT / 10:50 AM CST
    - cron: '25 17 * * 1-5'  # 12:25 PM CDT / 11:25 AM CST
    - cron: '0 18 * * 1-5'   #  1:00 PM CDT / 12:00 PM CST
    - cron: '35 18 * * 1-5'  #  1:35 PM CDT / 12:35 PM CST
    - cron: '10 19 * * 1-5'  #  2:10 PM CDT /  1:10 PM CST
    - cron: '45 19 * * 1-5'  #  2:45 PM CDT /  1:45 PM CST
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node.js 24 now to avoid forced migration warning (June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance feedparser numpy pytz

      - name: Run updater
        run: |
          for i in 1 2 3; do
            echo "Attempt $i"
            python update_dashboard.py && break
            [ $i -lt 3 ] && sleep 30
          done

      - name: Push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data $(date -u +%H:%M)"
          git push
