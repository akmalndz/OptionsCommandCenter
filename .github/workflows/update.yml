name: Options Command Center — Auto Update

# ─────────────────────────────────────────────────────────────────
# Chicago = CST (UTC-6) year-round entries only.
# GitHub Actions cron runs in UTC — CST = UTC-6, so add 6 hours.
#
# SCHEDULE (15 refreshes during market hours)
#
#  PREMARKET BIAS      7:00, 7:30, 8:20 AM CT
#  OPENING EXPANSION   8:35, 9:00, 9:45 AM CT
#  CONTINUATION        10:00, 10:20 AM CT
#  MIDDAY              11:00 AM, 12:00 PM CT
#  POWER WINDOW        1:00, 1:30, 2:00, 2:30, 3:00 PM CT
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0  13 * * 1-5'   # 7:00 AM CT
    - cron: '30 13 * * 1-5'   # 7:30 AM CT
    - cron: '20 14 * * 1-5'   # 8:20 AM CT
    - cron: '35 14 * * 1-5'   # 8:35 AM CT
    - cron: '0  15 * * 1-5'   # 9:00 AM CT
    - cron: '45 15 * * 1-5'   # 9:45 AM CT
    - cron: '0  16 * * 1-5'   # 10:00 AM CT
    - cron: '20 16 * * 1-5'   # 10:20 AM CT
    - cron: '0  17 * * 1-5'   # 11:00 AM CT
    - cron: '0  18 * * 1-5'   # 12:00 PM CT
    - cron: '0  19 * * 1-5'   # 1:00 PM CT
    - cron: '30 19 * * 1-5'   # 1:30 PM CT
    - cron: '0  20 * * 1-5'   # 2:00 PM CT
    - cron: '30 20 * * 1-5'   # 2:30 PM CT
    - cron: '0  21 * * 1-5'   # 3:00 PM CT

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dashboard-v5

      - name: Install dependencies
        run: pip install --quiet yfinance feedparser numpy pytz

      # 3 attempts with 30s wait — handles yfinance/Yahoo rate limits
      - name: Run dashboard updater (with retry)
        run: |
          for attempt in 1 2 3; do
            echo "▶ Attempt $attempt of 3..."
            if python update_dashboard.py; then
              echo "✅ Success on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "⚠️  Failed. Waiting 30s..."
              sleep 30
            fi
          done
          echo "❌ All 3 attempts failed."
          exit 1

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes." && exit 0
          git commit -m "📊 Dashboard — $(TZ='America/Chicago' date '+%I:%M %p CT, %b %d')"
          git push

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: update-dashboard
    if: failure()
    timeout-minutes: 2
    steps:
      - name: Log failure
        run: |
          echo "❌ DASHBOARD FAILED at $(TZ='America/Chicago' date '+%I:%M %p CT')"
          echo "🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
