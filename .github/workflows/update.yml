name: Update NVDA Dashboard (24x Daily)

# ─────────────────────────────────────────────────────────────────
# Chicago is CST (UTC-6) Nov–Mar  |  CDT (UTC-5) Mar–Nov
# Both CST and CDT crons run year-round — GitHub deduplicates.
#
# SCHEDULE (24 refreshes = every ~30 min during market hours)
#
#  PREMARKET BIAS          7:00, 7:30, 7:50, 8:20 AM CT
#  OPENING EXPANSION       8:35, 8:45, 9:00, 9:20, 9:45 AM CT
#  CONTINUATION            10:00, 10:20 AM CT
#  MIDDAY (light)          11:00, 11:30 AM CT, 12:00, 12:30, 1:00 PM CT
#  POWER WINDOW            1:15, 1:30, 2:00, 2:15, 2:30, 2:45, 3:00 PM CT
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    # ── PREMARKET BIAS ──────────────────────────────────────────
    - cron: '0  13 * * 1-5'   # 7:00 AM CST
    - cron: '0  12 * * 1-5'   # 7:00 AM CDT
    - cron: '30 13 * * 1-5'   # 7:30 AM CST
    - cron: '30 12 * * 1-5'   # 7:30 AM CDT
    - cron: '50 13 * * 1-5'   # 7:50 AM CST
    - cron: '50 12 * * 1-5'   # 7:50 AM CDT
    - cron: '20 14 * * 1-5'   # 8:20 AM CST
    - cron: '20 13 * * 1-5'   # 8:20 AM CDT

    # ── OPENING EXPANSION ───────────────────────────────────────
    - cron: '35 14 * * 1-5'   # 8:35 AM CST
    - cron: '35 13 * * 1-5'   # 8:35 AM CDT
    - cron: '45 14 * * 1-5'   # 8:45 AM CST
    - cron: '45 13 * * 1-5'   # 8:45 AM CDT
    - cron: '0  15 * * 1-5'   # 9:00 AM CST
    - cron: '0  14 * * 1-5'   # 9:00 AM CDT
    - cron: '20 15 * * 1-5'   # 9:20 AM CST
    - cron: '20 14 * * 1-5'   # 9:20 AM CDT
    - cron: '45 15 * * 1-5'   # 9:45 AM CST
    - cron: '45 14 * * 1-5'   # 9:45 AM CDT

    # ── CONTINUATION ────────────────────────────────────────────
    - cron: '0  16 * * 1-5'   # 10:00 AM CST
    - cron: '0  15 * * 1-5'   # 10:00 AM CDT
    - cron: '20 16 * * 1-5'   # 10:20 AM CST
    - cron: '20 15 * * 1-5'   # 10:20 AM CDT

    # ── MIDDAY STRUCTURE (light) ─────────────────────────────────
    - cron: '0  17 * * 1-5'   # 11:00 AM CST
    - cron: '0  16 * * 1-5'   # 11:00 AM CDT
    - cron: '30 17 * * 1-5'   # 11:30 AM CST
    - cron: '30 16 * * 1-5'   # 11:30 AM CDT
    - cron: '0  18 * * 1-5'   # 12:00 PM CST
    - cron: '0  17 * * 1-5'   # 12:00 PM CDT
    - cron: '30 18 * * 1-5'   # 12:30 PM CST
    - cron: '30 17 * * 1-5'   # 12:30 PM CDT

    # ── POWER WINDOW (most important) ───────────────────────────
    - cron: '0  19 * * 1-5'   # 1:00 PM CST
    - cron: '0  18 * * 1-5'   # 1:00 PM CDT
    - cron: '15 19 * * 1-5'   # 1:15 PM CST
    - cron: '15 18 * * 1-5'   # 1:15 PM CDT
    - cron: '30 19 * * 1-5'   # 1:30 PM CST
    - cron: '30 18 * * 1-5'   # 1:30 PM CDT
    - cron: '0  20 * * 1-5'   # 2:00 PM CST
    - cron: '0  19 * * 1-5'   # 2:00 PM CDT
    - cron: '15 20 * * 1-5'   # 2:15 PM CST
    - cron: '15 19 * * 1-5'   # 2:15 PM CDT
    - cron: '30 20 * * 1-5'   # 2:30 PM CST
    - cron: '30 19 * * 1-5'   # 2:30 PM CDT
    - cron: '45 20 * * 1-5'   # 2:45 PM CST
    - cron: '45 19 * * 1-5'   # 2:45 PM CDT
    - cron: '0  21 * * 1-5'   # 3:00 PM CST
    - cron: '0  20 * * 1-5'   # 3:00 PM CDT

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-nvda-v3

      - name: Install dependencies
        run: pip install yfinance feedparser numpy pytz

      - name: Run dashboard updater
        run: python update_dashboard.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 NVDA — $(TZ='America/Chicago' date '+%I:%M %p CT, %b %d')"
          git push
