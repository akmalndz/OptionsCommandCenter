name: Update Dashboard

on:
  schedule:
    # Chicago time (CDT = UTC-5, Mar–Nov). 12 runs, ~35 min apart, 8:30 AM–2:55 PM CDT.
    # NOTE: In CST season (Nov–Mar, UTC-6) these fire 1 hour earlier than shown.
    - cron: '30 13 * * 1-5'  #  8:30 AM CDT
    - cron: '5 14 * * 1-5'   #  9:05 AM CDT
    - cron: '40 14 * * 1-5'  #  9:40 AM CDT
    - cron: '15 15 * * 1-5'  # 10:15 AM CDT
    - cron: '50 15 * * 1-5'  # 10:50 AM CDT
    - cron: '25 16 * * 1-5'  # 11:25 AM CDT
    - cron: '0 17 * * 1-5'   # 12:00 PM CDT
    - cron: '35 17 * * 1-5'  # 12:35 PM CDT
    - cron: '10 18 * * 1-5'  #  1:10 PM CDT
    - cron: '45 18 * * 1-5'  #  1:45 PM CDT
    - cron: '20 19 * * 1-5'  #  2:20 PM CDT
    - cron: '55 19 * * 1-5'  #  2:55 PM CDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance feedparser numpy pytz

      - name: Run updater
        run: |
          for i in 1 2 3; do
            echo "Attempt $i"
            python update_dashboard.py && break
            [ $i -lt 3 ] && sleep 30
          done

      - name: Push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data $(date -u +%H:%M)"
          git push
